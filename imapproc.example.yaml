addr: imap.gmail.com:993
user: you@gmail.com
pass: your-app-password
mailbox: INBOX
exec: /usr/local/bin/process-email

# Action after successful processing: "seen" (default) or "delete"
on_success: seen

# Only process messages that arrive after startup via IMAP IDLE;
# skip the initial scan for pre-existing unread messages.
only_new: false

# Process all unread messages once and exit without entering IMAP IDLE.
# Useful for cron-style one-shot invocations.
once: false

# How often to refresh the IMAP IDLE connection (send DONE and re-issue IDLE).
# RFC 2177 permits servers to drop an IDLE session after 30 minutes, so
# refreshing before that limit keeps the connection alive.
# Accepts Go duration strings: "25m", "20m30s", etc.
# Default: 25m
# idle_refresh_interval: 25m

