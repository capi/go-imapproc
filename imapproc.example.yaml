addr: imap.gmail.com:993
user: you@gmail.com
pass: your-app-password
mailbox: INBOX
# exec accepts either a plain string (executable only) or a sequence of strings
# (executable followed by arguments), similar to the Docker CMD/ENTRYPOINT
# convention:
#
#   exec: /usr/local/bin/process-email
#   exec: ["/usr/local/bin/process-email", "--verbose", "--tag", "inbox"]
#
# Arguments can also be supplied on the command line after "--":
#   imapproc -- /usr/local/bin/process-email --verbose
exec: /usr/local/bin/process-email

# Action after successful processing: "seen" (default), "delete", or "move"
on_success: seen

# When on_success is "move", the message is moved to this mailbox.
# Defaults to "Trash" when not specified.
# on_success_target: Trash

# Process all unread messages once and exit without entering IMAP IDLE.
# Useful for cron-style one-shot invocations.
once: false

# How often to refresh the IMAP IDLE connection (send DONE and re-issue IDLE).
# RFC 2177 permits servers to drop an IDLE session after 30 minutes, so
# refreshing before that limit keeps the connection alive.
# Accepts Go duration strings: "25m", "20m30s", etc.
# Default: 25m
# idle_refresh_interval: 25m

# Automatically reconnect when the connection is lost (e.g. IDLE dropped,
# network outage) or when the initial connection fails at startup.
# Retries use exponential backoff between reconnect_initial_delay and
# reconnect_max_delay.
# Default: false
# reconnect: false

# Starting backoff delay before the first reconnect attempt.
# Doubles on each successive failure, up to reconnect_max_delay.
# Accepts Go duration strings: "5s", "10s", etc.
# Default: 5s
# reconnect_initial_delay: 5s

# Maximum backoff delay between reconnect attempts.
# Accepts Go duration strings: "5m", "10m", etc.
# Default: 5m
# reconnect_max_delay: 5m

# Enable the built-in HTTP monitoring server.
# Exposes a dashboard at / and a JSON health endpoint at /api/health.
# Only meaningful when running as a daemon (once: false).
# Default: false
# web_enabled: false

# Listen address for the HTTP monitoring server.
# Accepts any address understood by Go's net.Listen, e.g. ":8080" or
# "127.0.0.1:9090".
# Default: :8080
# web_addr: :8080

